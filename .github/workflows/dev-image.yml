name: Dev Image

# Publishes a testable image to GHCR on every push, so a specific commit can
# always be pulled by its short SHA — no need to wait for a merge or a
# release to try out a change:
#
#   ghcr.io/x3n0n10/stream-share-dashboard:dev-<short-sha>   (every push, any branch)
#   ghcr.io/x3n0n10/stream-share-dashboard:dev               (every push, any branch — "latest pushed")
#
# :dev always points at whichever push landed most recently, regardless of
# branch — if you're juggling multiple branches at once, pin :dev-<short-sha>
# instead so you know exactly which commit you're running.
#
# Uses the repo's built-in GITHUB_TOKEN — no secrets to configure.

on:
  push:
    branches:
      - '**'
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Build and push commit-tagged image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:dev-${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Move floating :dev tag
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:dev \
            ghcr.io/${{ github.repository }}:dev-${{ env.SHORT_SHA }}
